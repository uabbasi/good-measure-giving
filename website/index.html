<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Good Measure Giving | Muslim Charity Evaluator</title>

    <!-- SEO: default meta (overridden per-page by prerender) -->
    <meta name="description" content="Evidence-based evaluations of Muslim charities. Compare whether charities publicly say they accept zakat, along with impact scores and financial transparency across 160+ organizations." />
    <link rel="canonical" href="https://goodmeasuregiving.org/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Good Measure Giving | Muslim Charity Evaluator" />
    <meta property="og:description" content="Evidence-based evaluations of Muslim charities. Compare whether charities publicly say they accept zakat, along with impact scores and financial transparency across 160+ organizations." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goodmeasuregiving.org/" />
    <meta property="og:site_name" content="Good Measure Giving" />
    <meta property="og:image" content="https://goodmeasuregiving.org/og-share.png" />

    <!-- Resource hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Good Measure "Modern" design-motif fonts (used by the ?design=gmg preview) -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Amiri:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Libre+Caslon+Display&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      h1, h2, h3, h4 {
        font-family: 'Merriweather', serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .animate-fade-in { animation: none; }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
