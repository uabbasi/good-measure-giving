, managing multiple priorities, conflict resolution, leading with empathy and leading during times of crisis, agile management, and more. The goal is set to at least one training per quarter. In addition, and a 1:1 executive mentorship program has been initiated.\",\"mobilizationEfforts\":\"In the past couple years alone, we've worked with 210 community partners to deliver food aid, hot meals, hygiene kits, and essential PPE to our neighbors and frontline healthcare workers who needed them most. In addition, IRUSA has dedicated its efforts to working with Black and Brown communities right here at home--actively reaching out to community leaders to learn how IRUSA can best support critical work. IRUSA partnered with 68 Black Muslim-led organizations to deliver critical support to communities struggling due to the economic and health consequences of the pandemic. Additionally, we've worked with local, community-based organizations to support building their capacity so they are able to contribute to the needs of their communities more effectively. We also have strong advocacy efforts regarding climate change, gender justice, helping refugees, \u0026 ending hunger by 2030. And members of our leadership are regularly sought as thought-leaders on topics concerning humanitarian work.\",\"networksCollective\":true,\"other\":false,\"otherText\":\"\",\"policyAdvocacy\":true,\"raiseAwareness\":true,\"strategicPartnerships\":true,\"thoughtLeadership\":true,\"adaptationStory\":\"Our organization had to make major adjustments in order to keep operations and programming going amidst a global pandemic. In order to do so, we had to deploy a business continuity plan and switched to all remote operations. That included our fundraising events -- we moved to a completely virtual event space so that we could continue to engage with our audiences in meaningful ways, raise funds for important humanitarian programming, and to ensure that we did so in a safe environment. We also created a dedicated committee to COVID-19 that kept the organization abreast of developments from the CDC and others, helped outline health and safety measures for our employees, and set us up to successfully continue operating with all precautions accounted for in a very new, unprecedented environment. These are just some of the ways our organization adjusted so that we could continue pushing our mission forward at a time when the world needed humanitarian service more than ever.\",\"mentorshipCoaching\":false,\"conferencesNetworking\":true,\"educationalPrograms\":true,\"successionPlanning\":true,\"strategicPlanning\":true,\"organizationalRestructuring\":null,\"riskManagement\":true,\"operationalChanges\":null,\"capacityBuilding\":true,\"technologyIntegration\":true,\"organizationalCulture\":null,\"evaluationLearning\":null,\"programmaticShifts\":true,\"partnershipsCollaborations\":true,\"diversifyingFunding\":true,\"communityEngagement\":true,\"diversityTraining\":false,\"leadershipInvestmentNone\":false,\"mobilizationNone\":false,\"adaptabilityNone\":false,\"hasBoardApprovedBudget\":true,\"hasMission\":true,\"hasVision\":true,\"hasGoals\":true,\"submittedAt\":\"2026-03-10T16:47:19.444Z\",\"assessmentVersion\":2},\"constituentFeedback\":{\"id\":28508,\"collectingFeedback\":true,\"poorService\":false,\"positiveService\":false,\"fundamentalChanges\":false,\"developmentOfNew\":true,\"inclusionEquity\":false,\"strengthenRelationships\":true,\"dontActivelyUse\":false,\"needsAndGoals\":true,\"collectedAtLeastAnnually\":false,\"feedbackMarginalizedUnderRepresented\":true,\"feedbackFromEveryoneServed\":false,\"honestFeedbackMeasures\":true,\"analyzeOnDemographics\":false,\"postFeedbackEngagement\":false,\"feedbackShared\":false,\"feedbackGivenOnActions\":false,\"noMentionedPractices\":false,\"feedbackReceivedForActions\":false,\"difficultGettingResponses\":true,\"technology\":false,\"collectionBurdensome\":false,\"ongoingFunding\":false,\"lackOfStaffTime\":false,\"goodQuestions\":fal
